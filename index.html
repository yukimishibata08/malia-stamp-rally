<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Malia おでかけスタンプラリー</title>
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<meta name="theme-color" content="#FFDD1F">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root{
  --pink: #FF9868;
  --pink-deep: #FF7A45;
  --blue: #4FD5E3;
  --blue-deep: #17AFC2;
  --beige: #FFEFC4;
  --cream: #FCFEFE;
  --ink: #26363A;
  --ink-soft: #6C7E80;
  --gold: #FFC33D;
  --white: #FFFFFF;
  --shadow: 0 8px 24px rgba(38,54,58,0.10);
  --radius: 20px;
}
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:'Zen Kaku Gothic New','Noto Sans JP',sans-serif;
  background:linear-gradient(180deg,#FDFEFE 0%,#EAFBFB 45%,#E4F6E9 100%);
  color:var(--ink);
  min-height:100vh;
}
#app{max-width:480px;margin:0 auto;min-height:100vh;position:relative;padding-bottom:40px;}
.screen{padding:20px 20px 10px;animation:fadeIn .35s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;}
.topbar .logo{font-weight:900;font-size:20px;letter-spacing:.5px;color:var(--pink-deep);}
.topbar .sub{font-size:11px;color:var(--ink-soft);}

.hero{
  border-radius:0 0 0 0;
  background:linear-gradient(150deg,#FFD9A0 0%, var(--pink) 45%, var(--blue) 100%);
  padding:36px 24px 44px;
  position:relative;
  overflow:hidden;
  color:#fff;
}
.hero-wave{position:absolute;left:0;right:0;bottom:-1px;width:100%;height:32px;display:block;}
.hero-sun{position:absolute;top:-30px;right:-24px;width:130px;height:130px;border-radius:50%;background:radial-gradient(circle,#FFF3C9 0%,rgba(255,243,201,.4) 60%,rgba(255,243,201,0) 75%);}
.hero-palm{position:absolute;left:-6px;bottom:20px;font-size:52px;opacity:.55;transform:scaleX(-1);filter:drop-shadow(0 4px 6px rgba(0,0,0,.08));}
.hero-title{font-size:26px;font-weight:900;line-height:1.4;position:relative;z-index:2;text-shadow:0 2px 8px rgba(0,0,0,0.08);}
.hero-badge{display:inline-block;background:rgba(255,255,255,0.6);color:var(--ink);font-size:12px;padding:4px 12px;border-radius:20px;margin-bottom:12px;font-weight:700;letter-spacing:.5px;position:relative;z-index:2;}
.hero-desc{font-size:13.5px;margin-top:10px;opacity:.95;position:relative;z-index:2;}
.poster-img-wrap{ width:100%; line-height:0; }
.poster-img-wrap img{ width:100%; height:auto; display:block; }

.card{
  background:var(--white);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:20px;
  margin:16px 0;
}
h2.section-title{font-size:16px;font-weight:700;margin:0 0 14px;color:var(--ink);display:flex;align-items:center;gap:6px;}

.btn{
  display:block;width:100%;text-align:center;
  padding:16px;border:none;border-radius:16px;
  font-size:16px;font-weight:700;cursor:pointer;
  transition:transform .12s ease, box-shadow .12s ease;
  font-family:inherit;
}
.btn:active{transform:scale(.97);}
.btn-primary{background:linear-gradient(135deg,var(--pink-deep),var(--pink));color:#fff;box-shadow:0 6px 16px rgba(255,122,69,0.35);}
.btn-secondary{background:var(--white);color:var(--pink-deep);border:2px solid var(--pink);}
.btn-ghost{background:transparent;color:var(--ink-soft);font-weight:500;font-size:13px;padding:10px;}
.btn-outline-blue{background:#fff;color:var(--blue-deep);border:2px solid var(--blue);}

input[type=text],input[type=password],input[type=email],input[type=date],input[type=number],textarea,select{
  width:100%;padding:14px;border-radius:12px;border:2px solid #EFE2DC;
  font-size:15px;font-family:inherit;margin-bottom:12px;background:#fff;color:var(--ink);
}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--pink);}
label{font-size:12.5px;color:var(--ink-soft);font-weight:700;display:block;margin-bottom:6px;}

.stamp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.stamp-slot{
  aspect-ratio:1;border-radius:16px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;font-size:12px;font-weight:700;
  border:2px dashed #DCE9E9; color:#B8C4C4; background:#FBFEFE;position:relative;
}
.stamp-slot.filled{
  border:2px solid #FFE3D2;
  background:#FFFAF3;
  color:var(--pink-deep);
  box-shadow:0 4px 14px rgba(255,122,69,.25);
}
.stamp-slot .icon{display:block;margin-bottom:4px;color:inherit;}
.stamp-slot .icon svg{display:block;margin:0 auto;}
.icon-wrap.notgot svg{filter:grayscale(1) opacity(.4);}
.icon-wrap.got svg{filter:drop-shadow(0 3px 6px rgba(38,54,58,.18));}

.rare-icon svg{display:block;margin:0 auto;}
.rare-gold svg{filter:sepia(1) saturate(5) hue-rotate(-8deg) brightness(1.15) drop-shadow(0 0 6px rgba(255,195,61,.6));}
.rare-aurora svg{filter:drop-shadow(0 0 9px rgba(159,198,222,.75));}
.rare-jewel svg{filter:drop-shadow(0 0 9px rgba(255,179,214,.75));}
.rare-rainbow svg{animation:rareRainbow 3s linear infinite; filter:saturate(2.5) drop-shadow(0 0 6px rgba(255,255,255,.6));}
@keyframes rareRainbow{0%{filter:hue-rotate(0deg) saturate(2.5);}100%{filter:hue-rotate(360deg) saturate(2.5);}}
.rare-starry svg{filter:drop-shadow(0 0 9px rgba(195,174,224,.75));}
.rare-legendary svg{filter:saturate(1.8) drop-shadow(0 0 8px rgba(191,160,224,.7));}
.rare-locked svg{filter:grayscale(1) opacity(.4);}

/* ガチャ機風ボタン */
.btn-gacha{
  display:flex; align-items:center; justify-content:center; gap:10px;
  width:100%; padding:16px; border:none; border-radius:20px; cursor:pointer;
  background:linear-gradient(135deg,#FFD873,var(--pink)); color:#fff; font-weight:900; font-size:15.5px;
  box-shadow:0 8px 18px rgba(255,152,104,.4); font-family:inherit;
  transition:transform .12s ease;
}
.btn-gacha:active{transform:scale(.96);}
.btn-gacha .gacha-machine{font-size:26px; position:relative; display:inline-block; filter:drop-shadow(0 2px 3px rgba(0,0,0,.15));}
.btn-gacha .gacha-handle{position:absolute; top:-10px; right:-14px; font-size:15px; display:inline-block; transform-origin:70% 90%;}
.btn-gacha:hover .gacha-handle{animation:gachaHandleWiggle .5s ease;}
@keyframes gachaHandleWiggle{0%{transform:rotate(0deg);}30%{transform:rotate(-25deg);}70%{transform:rotate(15deg);}100%{transform:rotate(0deg);}}
.btn-gacha.spinning .gacha-machine{animation:gachaSpin .6s linear infinite;}
@keyframes gachaSpin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}

/* ガチャマシンのイラストと演出(ガチャ画面本体) */
.gm-scene{ position:relative; display:flex; flex-direction:column; align-items:center; padding:10px 0 4px; min-height:230px; justify-content:center; }
.gm-machine{ width:170px; height:auto; }
.gm-machine.shake{ animation: gmShake .6s ease; }
@keyframes gmShake{ 0%,100%{transform:translateX(0);} 20%{transform:translateX(-4px) rotate(-1deg);} 40%{transform:translateX(4px) rotate(1deg);} 60%{transform:translateX(-3px) rotate(-1deg);} 80%{transform:translateX(3px) rotate(1deg);} }
.gm-handle{ transform-origin:158px 176px; }
.gm-machine.handle-spin .gm-handle{ animation: gmHandleSpin .6s ease; }
@keyframes gmHandleSpin{ from{transform:rotate(0deg);} to{transform:rotate(360deg);} }
.gm-capsule-out{ position:relative; width:36px; height:36px; margin-top:-6px; display:none; }
.gm-capsule-out.drop{ display:block; animation: gmDrop .5s ease forwards; }
@keyframes gmDrop{ 0%{opacity:0; transform:translateY(-10px) scale(.6);} 60%{opacity:1; transform:translateY(6px) scale(1.05);} 100%{opacity:1; transform:translateY(0) scale(1);} }
.gm-capsule-half{ position:absolute; left:0; width:36px; height:18px; }
.gm-capsule-half.top{ top:0; border-radius:18px 18px 0 0; background:#FF9868; }
.gm-capsule-half.bottom{ bottom:0; border-radius:0 0 18px 18px; background:#FFD873; }
.gm-capsule-out.open .gm-capsule-half.top{ animation: gmOpenTop .4s ease forwards; }
.gm-capsule-out.open .gm-capsule-half.bottom{ animation: gmOpenBottom .4s ease forwards; }
@keyframes gmOpenTop{ to{ transform:translateY(-24px) rotate(-25deg); opacity:0; } }
@keyframes gmOpenBottom{ to{ transform:translateY(24px) rotate(25deg); opacity:0; } }
.btn-gacha2{
  display:block; width:100%; padding:16px; border:none; border-radius:16px; cursor:pointer;
  background:linear-gradient(135deg,var(--pink-deep),var(--pink)); color:#fff; font-weight:900; font-size:15.5px;
  box-shadow:0 8px 18px rgba(255,122,69,.35); font-family:inherit; transition:transform .12s ease;
}
.btn-gacha2:active{ transform:scale(.96); }

/* ===== 景品応募ポップアップ ===== */
.prize-modal-backdrop{
  position:fixed; inset:0; background:rgba(38,54,58,.55); z-index:1000;
  display:flex; align-items:center; justify-content:center; padding:20px;
  animation:prizeBackdropIn .25s ease;
}
@keyframes prizeBackdropIn{ from{opacity:0;} to{opacity:1;} }
.prize-modal{
  background:#FFFDF6; border-radius:22px; padding:26px 20px 22px; max-width:340px; width:100%;
  position:relative; text-align:center; box-shadow:0 20px 50px rgba(0,0,0,.25);
  animation:prizeModalIn .45s cubic-bezier(.34,1.56,.64,1);
}
@keyframes prizeModalIn{
  0%{ opacity:0; transform:scale(.7) translateY(20px); }
  60%{ opacity:1; transform:scale(1.04) translateY(-4px); }
  100%{ opacity:1; transform:scale(1) translateY(0); }
}
.prize-modal .sparkle{ z-index:2; }
.prize-modal-icon{ margin:6px 0 10px; font-size:56px; line-height:1; animation:prizePop .6s cubic-bezier(.34,1.56,.64,1) .15s both; }
.gacha-unlock-title{
  font-size:19px; font-weight:900; color:var(--pink-deep); line-height:1.4; margin:16px 0 4px;
  animation:prizePop .65s cubic-bezier(.34,1.56,.64,1) .1s both;
}
@keyframes prizePop{ from{ opacity:0; transform:scale(.5); } to{ opacity:1; transform:scale(1); } }
.prize-modal-title{ font-size:17px; font-weight:900; color:var(--ink); margin-bottom:6px; }
.prize-modal-name{ font-size:14px; font-weight:700; color:var(--pink-deep); margin-bottom:2px; }
.prize-modal-sub{ font-size:11.5px; color:var(--ink-soft); margin-bottom:12px; }
.prize-modal-note{ font-size:12.5px; color:var(--ink); background:#FFF3D0; border-radius:10px; padding:10px 12px; line-height:1.7; margin-bottom:8px; }
.prize-modal-safe{ font-size:11px; color:var(--ink-soft); margin-bottom:14px; line-height:1.6; }
.prize-modal-close{ position:absolute; top:10px; right:14px; background:none; border:none; font-size:18px; color:var(--ink-soft); cursor:pointer; }

/* ===== 図鑑画面の常設応募欄 ===== */
.prize-entry-card{ text-align:center; }
.prize-entry-row{ display:flex; align-items:center; gap:12px; padding:12px 4px; border-top:1px solid #F1E7DF; text-align:left; }
.prize-entry-row:first-of-type{ border-top:none; }
.prize-entry-row .prize-icon-wrap{ flex-shrink:0; }
.prize-entry-row .prize-text{ flex:1; }
.prize-entry-row .prize-label{ font-size:11px; color:var(--ink-soft); font-weight:700; }
.prize-entry-row .prize-name{ font-size:13px; font-weight:700; color:var(--ink); margin:1px 0; }
.prize-entry-row .prize-sub{ font-size:10.5px; color:var(--ink-soft); }
.prize-entered-badge{ display:inline-block; background:#E4F5EC; color:#3A9463; font-size:11.5px; font-weight:700; padding:4px 10px; border-radius:20px; }
.prize-line-again{ display:block; font-size:11px; color:var(--blue-deep); margin-top:4px; background:none; border:none; cursor:pointer; padding:0; text-decoration:underline; }
.prize-confirm-box{ margin-top:8px; background:#FFF6E8; border-radius:10px; padding:8px 10px; font-size:11.5px; color:var(--ink-soft); }
.prize-confirm-box button{ margin-top:6px; }

/* 賞状風 認定証（背景画像＋重ね文字） */
.cert4-wrap{ padding:6px 0 4px; }
.cert4-frame{ position:relative; width:100%; aspect-ratio:1536/1024; background:#FFFDF6; cursor:zoom-in; transition:transform .25s ease, box-shadow .25s ease; overflow:hidden; }
.cert4-bg{ width:100%; height:100%; object-fit:contain; display:block; }
.cert4-overlay{ position:absolute; top:0; left:0; right:0; bottom:0; font-family:'Noto Serif JP',serif; color:#2b2420; visibility:hidden; }
.cert4-loading{ position:absolute; top:0; left:0; right:0; bottom:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; background:#FFFDF6; font-size:13px; color:#8a7a5a; font-family:'Zen Kaku Gothic New',sans-serif; }
.cert4-spinner{ width:26px; height:26px; border:3px solid #E7DCC2; border-top-color:#C9A227; border-radius:50%; animation:certSpin .8s linear infinite; }
@keyframes certSpin{ to{ transform:rotate(360deg); } }
.cert4-title{ position:absolute; top:23%; left:0; right:0; text-align:center; font-weight:900; letter-spacing:2px; color:#3a2a1a; font-size:3.5em; }
.cert4-name{ position:absolute; top:33%; left:0; right:0; text-align:center; font-weight:900; color:#2b2420; font-family:'Zen Kaku Gothic New',sans-serif; font-size:2.85em; }
.cert4-name .honor{ font-size:.55em; margin-left:6px; color:#5b5044; }
.cert4-body{ position:absolute; top:46%; left:12%; right:12%; text-align:center; color:#3a3226; font-size:2.6em; line-height:2.1; }
.cert4-meta{ position:absolute; top:77%; left:12%; right:12%; text-align:center; color:#4a4030; font-family:'Zen Kaku Gothic New',sans-serif; white-space:nowrap; font-size:1.65em; }
.cert4-meta .sep{ opacity:.5; margin:0 5px;}
body.cert-zoomed{ overflow:hidden; }
body.cert-zoomed::before{ content:''; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(20,15,10,.65); z-index:998; }
body.cert-zoomed .cert4-frame{
  position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
  width:92vw; max-width:640px; z-index:999; box-shadow:0 12px 44px rgba(0,0,0,.45); cursor:zoom-out;
}

/* レア生きもの登場演出 */
.gacha-reveal{position:relative; display:inline-block; padding-top:10px;}
.gacha-glow{
  position:absolute; top:0; left:50%; width:170px; height:170px; transform:translateX(-50%);
  background:radial-gradient(circle, rgba(255,211,120,.6) 0%, rgba(255,211,120,0) 70%);
  animation:glowPulse 1.8s ease-out 1;
}
.gacha-glow.aurora-ring{
  width:210px; height:210px;
  background:
    radial-gradient(circle, rgba(255,214,235,.55) 0%, rgba(255,214,235,0) 55%),
    conic-gradient(from 0deg, rgba(255,196,229,.45), rgba(191,224,255,.45), rgba(255,241,181,.45), rgba(214,196,255,.45), rgba(255,196,229,.45));
  border-radius:50%;
  animation: auroraSpin 2.6s linear infinite, glowPulse 2s ease-out 1;
  filter: blur(6px);
}
@keyframes auroraSpin{ from{ transform:translateX(-50%) rotate(0deg); } to{ transform:translateX(-50%) rotate(360deg); } }
.rare-pop svg{animation:rarePop 1.6s cubic-bezier(.34,1.56,.64,1) forwards;}
@keyframes rarePop{
  0%{opacity:0; transform:scale(.4) translateY(14px);}
  55%{opacity:1; transform:scale(1.16) translateY(-6px);}
  75%{transform:scale(.95) translateY(0);}
  100%{opacity:1; transform:scale(1) translateY(0);}
}
.rare-name-pop{animation:fadeIn .6s ease .5s both;}
.rare-name-shine{
  background:linear-gradient(90deg, var(--ink) 0%, var(--ink) 40%, #FFF6C9 50%, var(--ink) 60%, var(--ink) 100%);
  background-size:250% 100%;
  -webkit-background-clip:text; background-clip:text; color:transparent;
  animation:fadeIn .6s ease .5s both, nameShine 2.2s linear .8s infinite;
}
@keyframes nameShine{ from{ background-position:200% 0; } to{ background-position:-50% 0; } }

.remain-banner{
  text-align:center;padding:16px;border-radius:16px;font-weight:900;font-size:16px;
  background:linear-gradient(135deg,#FFF3D0,#D6F7F5);color:var(--pink-deep);margin-top:16px;
  border:2px solid var(--pink);
}
.remain-banner.final{
  background:linear-gradient(135deg,#FFD873,#FF9868);
  animation:pulse 1.4s infinite;font-size:17px;
}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.03);}}

.store-row{display:flex;gap:12px;align-items:center;padding:12px;border-radius:14px;background:#fff;margin-bottom:10px;box-shadow:var(--shadow);cursor:pointer;}
.store-row img{width:56px;height:56px;border-radius:12px;object-fit:cover;background:#eee;flex-shrink:0;}
.store-row .name{font-weight:700;font-size:14.5px;}
.store-row .status{font-size:11.5px;margin-top:2px;}
.store-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:6px;}
.store-card{
  display:flex;flex-direction:column;background:#fff;border-radius:14px;padding:0;
  box-shadow:var(--shadow);cursor:pointer;height:100%;overflow:hidden;
}
.store-card-photo{
  width:100%;aspect-ratio:3/2;object-fit:cover;display:block;background:#F3ECE2;
}
.store-card-photo.placeholder{
  display:flex;align-items:center;justify-content:center;
  font-size:11px;color:var(--ink-soft);text-align:center;
}
.store-card-body{ display:flex;flex-direction:column;flex:1;padding:10px 12px 12px; }
.store-card-name{font-weight:700;font-size:13.5px;line-height:1.35;word-break:break-word;margin-bottom:4px;}
.store-card-addr{font-size:11px;color:var(--ink-soft);line-height:1.45;word-break:break-word;flex:1;margin-bottom:8px;}
.store-card .status{font-size:11px;margin-bottom:8px;}
.store-card-mapbtn{font-size:11.5px;padding:9px 6px;margin-top:auto;}
.status.got{color:#4CAF7D;font-weight:700;}
.status.not{color:var(--ink-soft);}

.detail-photo{width:100%;height:190px;object-fit:cover;border-radius:16px;background:#eee;margin-bottom:14px;}
.info-line{display:flex;gap:10px;font-size:13.5px;margin-bottom:10px;align-items:flex-start;}
.info-line .ico{width:20px;text-align:center;}
.coupon-box{background:var(--beige);border-radius:14px;padding:14px;margin-top:14px;font-size:13.5px;border:2px dashed var(--gold);}

.get-anim{
  text-align:center;padding:30px 10px;
}
.get-anim .stamp-pop{display:inline-block;color:var(--pink-deep);position:relative;z-index:2;}
.get-anim .stamp-pop svg{filter:drop-shadow(0 6px 14px rgba(255,122,69,.35));}
.discover-icon svg{animation:creatureReveal 1.1s ease forwards;}
@keyframes creatureReveal{
  0%{filter:grayscale(1) brightness(.55);opacity:.25;transform:scale(.65) rotate(-8deg);}
  55%{filter:grayscale(.25) brightness(.95);opacity:.85;transform:scale(1.12) rotate(4deg);}
  100%{filter:grayscale(0) brightness(1);opacity:1;transform:scale(1) rotate(0deg);}
}
.discover-glow{
  position:absolute;top:10px;left:50%;width:160px;height:160px;transform:translateX(-50%);
  background:radial-gradient(circle, rgba(255,211,120,.55) 0%, rgba(255,211,120,0) 70%);
  animation:glowPulse 1.6s ease-out 1;z-index:1;
}
@keyframes glowPulse{0%{opacity:0;transform:translateX(-50%) scale(.6);}40%{opacity:1;}100%{opacity:0;transform:translateX(-50%) scale(1.3);}}
.discover-badge{
  position:absolute;top:14px;right:14px;z-index:3;
  background:var(--pink-deep);color:#fff;font-weight:900;font-size:12px;padding:5px 12px;border-radius:20px;
  transform:rotate(10deg) scale(0);animation:badgePop .4s ease .5s forwards;
}
@keyframes badgePop{0%{transform:rotate(10deg) scale(0);}70%{transform:rotate(10deg) scale(1.2);}100%{transform:rotate(10deg) scale(1);}}
.sparkle{position:absolute;font-size:18px;animation:floatUp 1.6s ease-out forwards;opacity:0;z-index:2;}
@keyframes floatUp{0%{opacity:0;transform:translateY(0) scale(.5);}30%{opacity:1;}100%{opacity:0;transform:translateY(-60px) scale(1.1);}}

.complete-screen{
  background:linear-gradient(180deg,#FFF9E5 0%, #FFDDB0 40%, #A9EBEF 100%);
  min-height:100vh;padding:30px 22px;text-align:center;position:relative;overflow:hidden;
}
.complete-stamp{
  display:inline-block;border:6px solid #fff;color:#fff;background:linear-gradient(135deg,var(--pink-deep),var(--gold));

    return { id:data.id, nickname:data.nickname, device_token:data.device_token, restore_token:data.restore_token, stamps:(stampRows||[]).map(r=>r.store_id) };
  }catch(e){ console.error('loadParticipant failed', e); return null; }

async function findParticipantByRestoreToken(token){

    return { id:data.id, nickname:data.nickname, device_token:data.device_token, restore_token:data.restore_token, stamps:(stampRows||[]).map(r=>r.store_id) };

/* 復元用URL(?r=...)の発行。失敗しても通常のスタンプラリー機能は止めない */
async function ensureRestoreToken(participant){
  if(!participant) return null;
  if(participant.restore_token){ return participant.restore_token; }
  try{
    const { data, error } = await sb.rpc('issue_restore_token', { p_device_token: participant.device_token });
    if(error || !data) return null;
    participant.restore_token = data;
    return data;
  }catch(e){ console.error('restore_token発行失敗（通常機能には影響しません）', e); return null; }
}
async function createParticipantDB(nickname){
  const token = getDeviceToken();
  const { data, error } = await sb.from('participants').insert({device_token:token, nickname}).select().single();
  if(error) throw error;
  return { id:data.id, nickname:data.nickname, device_token:data.device_token, restore_token:data.restore_token, stamps:[] };
}

/* ---- レア生きものガチャ（rare_gacha_results テーブルのみ使用） ---- */
async function getGachaResult(stage){
  if(!state.participant) return null;
  try{
    const { data, error } = await sb.from('rare_gacha_results').select('creature').eq('participant_id', state.participant.id).eq('stage', stage).maybeSingle();
    if(error){
      console.error('[gacha] getGachaResult エラー', {stage, message:error.message, code:error.code, details:error.details, hint:error.hint});
      return null;
    }
    if(!data) return null;
    return data.creature;
  }catch(e){ console.error('[gacha] getGachaResult 例外', e); return null; }
}
async function drawGachaDB(stage){
  // すでにこの回の結果がある場合は、新しく引き直さずそれを返す（通信エラー後の再試行でも安全にする）
  const existing = await getGachaResult(stage);
  if(existing){ return { creature: existing, alreadyDrawn:true }; }

  if(!state.participant || !state.participant.id){
    console.error('[gacha] drawGachaDB: state.participant が未確定のまま呼び出されました', state.participant);
    throw new Error('participant not ready');
  }

  let excluded = null;
  if(stage===5){ excluded = await getGachaResult(3); }
  const pool = excluded ? RARE_CREATURES.filter(c=>c!==excluded) : RARE_CREATURES;
  const pick = pool[Math.floor(Math.random()*pool.length)];

  const participantId = state.participant.id;
  let lastErr = null;
  for(let attempt=0; attempt<3; attempt++){
    try{
      const { error } = await sb.from('rare_gacha_results').insert({participant_id:participantId, stage, creature:pick});
      if(error){
        console.error('[gacha] insert エラー (attempt '+(attempt+1)+'/3)', {stage, participantId, message:error.message, code:error.code, details:error.details, hint:error.hint});
        if(error.code==='23505'){
          const already = await getGachaResult(stage);
          return { creature: already, alreadyDrawn:true };
        }
        throw error;
      }
      return { creature: pick, alreadyDrawn:false };
    }catch(e){
      lastErr = e;
      console.error('[gacha] insert 例外 (attempt '+(attempt+1)+'/3)', e);
      if(attempt<2){ await new Promise(r=>setTimeout(r, 500*(attempt+1))); }
    }
  }
  // 3回とも失敗した場合でも、実は書き込み自体は成功していて応答だけ届かなかった可能性があるため、最後にもう一度だけ確認する
  const recheck = await getGachaResult(stage);
  if(recheck){ return { creature: recheck, alreadyDrawn:true }; }
  console.error('[gacha] 3回再試行しても保存できませんでした', {stage, participantId, lastError: lastErr});
  logGachaError(stage, lastErr);
  throw lastErr;
}
async function logGachaError(stage, err){
  // 参加者の画面には一切表示せず、管理画面でだけ確認できるよう記録する（この記録自体が失敗しても無視する）
  try{
    await sb.from('gacha_error_logs').insert({
      participant_id: state.participant ? state.participant.id : null,
      nickname: state.participant ? state.participant.nickname : null,
      stage: stage,
      error_message: err ? String(err.message || err) : '不明なエラー',
      error_code: err ? (err.code || '') : '',
      error_details: err ? (err.details || '') : '',
      error_hint: err ? (err.hint || '') : '',
    });
  }catch(e){ console.error('[gacha] エラーログの記録自体に失敗', e); }
}

  }
  return `<div class="prize-entry-row">

async function renderPrizeSection(cfg, p, gotCount){
  const show3 = gotCount>=3;
  const show5 = gotCount>=5;
  if(!show3 && !show5) return '';
  const entered3 = show3 ? await getPrizeEntry(3) : false;
  const entered5 = show5 ? await getPrizeEntry(5) : false;
  let rows = '';
  if(show3) rows += prizeEntryRowHtml(3, entered3);
  if(show5) rows += prizeEntryRowHtml(5, entered5);
  return `<div class="card prize-entry-card">
    <h2 class="section-title">🎁 景品に応募する</h2>
    <div class="small-note" style="margin-bottom:8px;">${p.nickname}さん・現在 ${gotCount}/${cfg.requiredStamps} 個達成</div>
    ${rows}
  </div>`;
}

function wirePrizeSection(wrap, cfg){
  wrap.querySelectorAll('.prize-line-btn').forEach(btn=>{
    btn.onclick = ()=>{
      window.open(cfg.lineUrl || 'https://line.me/', '_blank');
      const stage = btn.dataset.stage;
      const box = wrap.querySelector('.prize-confirm-box[data-stage="'+stage+'"]');
      if(box) box.style.display = 'block';
      btn.style.display = 'none';
    };
  });
  wrap.querySelectorAll('.prize-confirm-btn').forEach(btn=>{
    btn.onclick = async ()=>{
      const stage = parseInt(btn.dataset.stage, 10);
      btn.disabled = true; btn.textContent = '保存中…';
      await markPrizeEntered(stage);
      render();
    };
  });
  wrap.querySelectorAll('.prize-line-again').forEach(btn=>{
    btn.onclick = ()=>{ window.open(cfg.lineUrl || 'https://line.me/', '_blank'); };
  });
}

const state = {

  currentStoreId:null,
  codeError:'',

};

function go(screen, extra){ Object.assign(state, {screen}, extra||{}); render(); window.scrollTo(0,0); }


function remainingCount(p, required){ return Math.max(required - (p? p.stamps.length : 0), 0); }

function remainMessage(gotCount, total){
  const remain = total - gotCount;
  const overview = `${total}種類のうち、${gotCount}種類を発見！`;
  if(remain<=0) return null;
  let tier;
  if(remain===1) tier = '🌴 あと1種類でコンプリート！';
  else if(remain===2) tier = '🏝️ あと2種類でコンプリート！';
  else tier = 'あと'+remain+'種類でコンプリート！';
  return {overview, tier, final: remain===1};
}

/* =============== 初期ロード =============== */
async function boot(){
  const rToken = getUrlParam('r');
  if(rToken){
    const byToken = await findParticipantByRestoreToken(rToken);
    if(byToken){ state.participant = byToken; go('card'); return; }
  }
  const p = await loadParticipantByDeviceToken();
  if(p){
    state.participant = p;
    const token = await ensureRestoreToken(p);
    if(token){ setUrlParamPreserveOthers('r', token); }
    go('card');
    return;
  }
  go('top');
}

/* =============== レンダリング =============== */
function el(html){ const d=document.createElement('div'); d.innerHTML=html; return d.firstElementChild; }

async function render(){
  const app = document.getElementById('app');
  app.innerHTML = '<div style="text-align:center;padding:80px 20px;color:#B98;">読み込み中…</div>';
  try{
    const view = await renderScreen();
    app.innerHTML = '';
    app.appendChild(view);
  }catch(e){
    console.error('render failed:', e);
    app.innerHTML = `
      <div style="padding:60px 24px;text-align:center;">
        <div style="font-size:36px;margin-bottom:12px;">📶</div>
        <h2 style="margin-bottom:10px;">通信の状態が不安定なようです</h2>
        <p style="font-size:13px;color:var(--ink-soft);line-height:1.7;margin-bottom:20px;">電波の良い場所で、もう一度お試しください。</p>
        <button class="btn btn-primary" id="retryBtn" style="max-width:260px;margin:0 auto;">もう一度試す</button>
      </div>`;
    const rb = document.getElementById('retryBtn');
    if(rb) rb.onclick = ()=> render();
  }
}

async function renderScreen(){
  const cfg = await getConfigDB();
  const stores = await getStoresDB();

  if(state.screen==='top') return screenTop(cfg);
  if(state.screen==='join') return screenJoin(cfg);
  if(state.screen==='card') return await screenCard(cfg, stores);
  if(state.screen==='storeList') return await screenStoreList(cfg, stores);
  if(state.screen==='storeDetail') return screenStoreDetail(cfg, stores);
  if(state.screen==='codeInput') return screenCodeInput(cfg, stores);
  if(state.screen==='gotStamp') return await screenGotStamp(cfg, stores);
  if(state.screen==='complete') return await screenComplete(cfg);
  if(state.screen==='rareCollection') return await screenRareCollection(cfg);
  if(state.screen==='gacha') return await screenGacha(cfg);
  if(state.screen==='certificate') return await screenCertificate(cfg);
  if(state.screen==='adminLogin') return screenAdminLogin(cfg);
  if(state.screen==='adminHome') return await screenAdminHome(cfg, stores);
  return el('<div>画面がありません</div>');
}

  <div class="topbar"><div class="logo">Malia</div><div class="sub">こんにちは、${p.nickname}さん</div></div>

  });
  wrap.querySelector('#submit').onclick = async ()=>{
    const code = boxes.map(b=>b.value).join('');
    if(code.length<4){ go('codeInput', {codeError:'4桁すべて入力してください'}); return; }
    if(code !== s.code){ go('codeInput', {codeError:'コードが正しくありません'}); return; }
    const p = state.participant || {stamps:[]};
    if(p.stamps.includes(s.id)){ go('codeInput', {codeError:'この生き物はすでに発見済みです'}); return; }

/* ---------- スタンプ付与処理（QR読み取り＝スタンプ獲得） ---------- */
async function grantStamp(storeId){
  if(!state.participant){ go('top'); return; }
  if(state.participant.stamps.includes(storeId)){
    go('codeInput', {currentStoreId:storeId, codeError:'この生き物はすでに発見済みです'});
    return;
  }
  try{
    const { error } = await sb.from('participant_stamps').insert({participant_id: state.participant.id, store_id: storeId});
    if(error){
      if(error.code==='23505'){ go('codeInput', {currentStoreId:storeId, codeError:'この生き物はすでに発見済みです'}); return; }
      throw error;
    }
  }catch(e){
    console.error('grantStamp failed', e);
    go('codeInput', {currentStoreId:storeId, codeError:'通信エラーが発生しました。もう一度お試しください。'});
    return;
  }
  state.participant.stamps.push(storeId);
  go('gotStamp', {justGotStamp:storeId, codeError:''});
}

function loadExternalScript(src){
  return new Promise((resolve, reject)=>{
    if(document.querySelector(`script[src="${src}"]`)){ resolve(); return; }
    const s = document.createElement('script');
    s.src = src; s.onload = ()=>resolve(); s.onerror = ()=>reject(new Error('script load failed'));
    document.head.appendChild(s);
  });
}

          そのがんばりをたたえ、ここに認定します。
        </div>
        <div class="cert4-meta">
          <span>達成日：${dtStr}</span>
          <span class="sep">｜</span>
          <span>達成番号：${ach.number}</span>
        </div>
      </div>
      <div class="cert4-loading" id="certLoading">
        <div class="cert4-spinner"></div>
        <div>認定証を作成しています…</div>
      </div>
    </div>
  </div>
  <div class="small-note" style="text-align:center;margin-top:8px;">タップすると拡大して確認できます</div>
  <div class="small-note" style="text-align:center;margin-top:10px;font-weight:700;">📸 この画面をスクリーンショットして保存してね</div>
  <button class="btn btn-ghost" id="back" style="margin-top:14px;">もどる</button>
  `;
  const certFrame = wrap.querySelector('#certCard4');
  const certOverlay = wrap.querySelector('#certOverlay');
  const certLoading = wrap.querySelector('#certLoading');
  const certBgImg = wrap.querySelector('#certBgImg');
  function sizeCertificate(){
    if(!certFrame) return;
    const w = certFrame.offsetWidth;
    if(!w) return;
    certFrame.style.fontSize = (w*0.01)+'px';
  }
  window.addEventListener('resize', sizeCertificate);
  async function waitImageReady(img){
    if(img.decode){ try{ await img.decode(); return; }catch(e){} }
    if(img.complete) return;
    await new Promise(res=>{ img.addEventListener('load', res, {once:true}); img.addEventListener('error', res, {once:true}); });
  }
  async function revealCertificateWhenReady(){
    try{ await waitImageReady(certBgImg); }catch(e){}
    try{ if(document.fonts && document.fonts.ready) await document.fonts.ready; }catch(e){}
    sizeCertificate();
    requestAnimationFrame(()=>{
      requestAnimationFrame(()=>{
        sizeCertificate();
        certLoading.style.display = 'none';
        certOverlay.style.visibility = 'visible';
      });
    });
  }
  revealCertificateWhenReady();
  certFrame.addEventListener('click', ()=>{ document.body.classList.toggle('cert-zoomed'); setTimeout(sizeCertificate, 260); });

  wrap.querySelector('#back').onclick = ()=> go('card');
  return wrap;
}

async function screenAdminHome(cfg, stores){
  if(!state.admin){ go('adminLogin'); return el('<div></div>'); }
  const wrap = el('<div class="screen"></div>');
  const tabs = ['stores','participants','achievers','errorlogs','settings'];
  const tabLabel = {stores:'店舗管理', participants:'参加者', achievers:'達成者', errorlogs:'エラーログ', settings:'設定'};
  wrap.innerHTML = `
  <div class="topbar"><div class="logo">Malia 管理画面</div><button class="link-btn" id="logout">ログアウト</button></div>
  <div class="tabbar">${tabs.map(t=>`<button data-t="${t}" class="${state.adminTab===t?'active':''}">${tabLabel[t]}</button>`).join('')}</div>
  <div id="tabBody"></div>
  `;
  wrap.querySelectorAll('.tabbar button').forEach(b=> b.onclick = ()=>{ state.adminTab=b.dataset.t; render(); });
  wrap.querySelector('#logout').onclick = ()=>{ state.admin=false; go('top'); };

  const body = wrap.querySelector('#tabBody');
  if(state.adminTab==='stores') body.appendChild(await adminStores(cfg, stores));
  if(state.adminTab==='participants') body.appendChild(await adminParticipants(cfg, stores));
  if(state.adminTab==='achievers') body.appendChild(await adminAchievers(cfg));

  return wrap;
}

async function adminStores(cfg, stores){
  const wrap = el('<div></div>');
  if(state.editingStore){
    const s = stores.find(x=>x.id===state.editingStore) || {id:'', name:'', icon:'turtle', code:'', photo:'', address:'', hours:'', homepage:'', instagram:'', coupon:'', mapUrl:''};
    const isNew = !stores.find(x=>x.id===state.editingStore);
    let currentPhoto = s.photo || '';
    wrap.innerHTML = `
    <div class="card">
      <h2 class="section-title">${isNew?'➕ 店舗を追加':'✏️ 店舗を編集'}</h2>
      <label>店舗ID（英数字・重複不可）</label><input id="f_id" value="${s.id}" ${isNew?'':'disabled'}>
      <label>店舗名</label><input id="f_name" value="${s.name}">
      <label>割り当てる生き物</label>
      <select id="f_icon">${ICON_KEYS.map(k=>`<option value="${k}" ${s.icon===k?'selected':''}>${ICON_LABELS[k]}</option>`).join('')}</select>
      <label>発見用の4桁コード（お店に掲示）</label><input id="f_code" value="${s.code||''}" maxlength="4">
      <label>店舗写真</label>
      <div style="margin-bottom:12px;">
        <img id="photoPreview" src="${currentPhoto || 'https://images.weserv.nl/?url=placehold.co/300x200/F3ECE2/9c8a7a?text=写真準備中'}" style="width:100%;max-width:260px;aspect-ratio:3/2;object-fit:cover;border-radius:12px;display:block;margin-bottom:8px;background:#F3ECE2;">
        <input type="file" id="f_photo_file" accept="image/jpeg,image/png,image/webp" style="display:none;">
        <button type="button" class="btn btn-secondary" id="photoUploadBtn">📷 写真をアップロード（差し替え）</button>
        <div id="photoUploadMsg" class="small-note" style="display:none;"></div>
      </div>
      <label>住所</label><input id="f_address" value="${s.address}">
      <label>GoogleマップのURL（空欄なら住所から自動で作成されます）</label><input id="f_mapurl" value="${s.mapUrl||''}" placeholder="https://maps.app.goo.gl/...">
      <label>営業時間</label><input id="f_hours" value="${s.hours}">
      <label>ホームページURL</label><input id="f_homepage" value="${s.homepage}">
      <label>Instagram URL</label><input id="f_instagram" value="${s.instagram}">
      <label>クーポン情報</label><input id="f_coupon" value="${s.coupon}">
      <button class="btn btn-primary" id="save">保存する</button>
      <button class="btn btn-ghost" id="cancel">キャンセル</button>
    </div>`;
    wrap.querySelector('#cancel').onclick = ()=>{ state.editingStore=null; render(); };

    const ALLOWED_TYPES = ['image/jpeg','image/png','image/webp'];
    const MAX_SIZE = 5*1024*1024;
    wrap.querySelector('#photoUploadBtn').onclick = ()=> wrap.querySelector('#f_photo_file').click();
    wrap.querySelector('#f_photo_file').onchange = async (e)=>{
      const file = e.target.files[0];
      const msgEl = wrap.querySelector('#photoUploadMsg');
      msgEl.style.display = 'none';
      if(!file) return;
      const storeId = wrap.querySelector('#f_id').value.trim();
      if(!storeId){ msgEl.textContent = '先に店舗IDを入力してください。'; msgEl.style.display='block'; return; }
      if(!ALLOWED_TYPES.includes(file.type)){ msgEl.textContent = 'JPEG・PNG・WebPの画像のみアップロードできます。'; msgEl.style.display='block'; return; }
      if(file.size > MAX_SIZE){ msgEl.textContent = 'ファイルサイズは5MB以下にしてください。'; msgEl.style.display='block'; return; }
      msgEl.textContent = 'アップロード中…'; msgEl.style.display='block';
      try{
        const path = storeId + '.img';
        const { error: upErr } = await sb.storage.from('store-photos').upload(path, file, { upsert:true, contentType:file.type });
        if(upErr) throw upErr;
        const { data: pub } = sb.storage.from('store-photos').getPublicUrl(path);
        const url = pub.publicUrl + '?t=' + Date.now();
        currentPhoto = url;
        wrap.querySelector('#photoPreview').src = url;
        msgEl.textContent = '✔ アップロードが完了しました';
      }catch(err){
        console.error('photo upload failed', err);
        msgEl.textContent = 'アップロードに失敗しました。もう一度お試しください。';
      }
    };

    wrap.querySelector('#save').onclick = async ()=>{
      const newS = {
        id: wrap.querySelector('#f_id').value.trim(),
        name: wrap.querySelector('#f_name').value.trim(),
        icon: wrap.querySelector('#f_icon').value,
        code: wrap.querySelector('#f_code').value.trim(),
        photo: currentPhoto,
        address: wrap.querySelector('#f_address').value.trim(),
        mapUrl: wrap.querySelector('#f_mapurl').value.trim(),
        hours: wrap.querySelector('#f_hours').value.trim(),
        homepage: wrap.querySelector('#f_homepage').value.trim(),
        instagram: wrap.querySelector('#f_instagram').value.trim(),
        coupon: wrap.querySelector('#f_coupon').value.trim(),
      };
      if(!newS.id || !newS.name){ alert('店舗IDと店舗名は必須です'); return; }
      try{
        await saveStoreDB(newS);
      }catch(e){ alert('保存に失敗しました。もう一度お試しください。'); return; }
      state.editingStore=null;
      if(isNew){ state.justAddedStoreId = newS.id; }
      render();
    };
    return wrap;
  }
  const rows = stores.map(s=>`
    <tr>
      <td>${s.name}</td><td>${s.id}</td>
      <td><button class="link-btn" data-edit="${s.id}">編集</button></td>
      <td><button class="link-btn" data-qr="${s.id}" style="color:#8EC0CF;">QR</button></td>
      <td><button class="link-btn" data-del="${s.id}" style="color:#C0555F;">削除</button></td>
    </tr>`).join('');
  wrap.innerHTML = `
  <div class="card">
    <h2 class="section-title">🏪 店舗一覧（${stores.length}件）</h2>
    <table class="admin-table"><thead><tr><th>店舗名</th><th>ID</th><th></th><th></th><th></th></tr></thead><tbody>${rows}</tbody></table>
    <button class="btn btn-primary" id="addNew" style="margin-top:14px;">＋ 新しい店舗を追加</button>
  </div>
  <div id="qrArea"></div>
  `;
  wrap.querySelector('#addNew').onclick = ()=>{ state.editingStore='__new__'+Date.now(); render(); };
  wrap.querySelectorAll('[data-edit]').forEach(b=> b.onclick = ()=>{ state.editingStore=b.dataset.edit; render(); });
  wrap.querySelectorAll('[data-del]').forEach(b=> b.onclick = async ()=>{
    if(!confirm('この店舗を削除しますか？')) return;
    await deleteStoreDB(b.dataset.del);
    render();
  });
  wrap.querySelectorAll('[data-qr]').forEach(b=> b.onclick = ()=> showQr(b.dataset.qr, wrap.querySelector('#qrArea')));
  if(state.justAddedStoreId){
    const newId = state.justAddedStoreId;
    state.justAddedStoreId = null;
    showQr(newId, wrap.querySelector('#qrArea'), `<div class="small-note" style="text-align:center;margin-bottom:8px;">🎉 新しい店舗を追加しました。QRコードを自動生成しました。</div>`);
  }
  return wrap;
}

function showQr(storeId, container, extraNote){
  container.innerHTML = `${extraNote||''}<div class="qr-box"><div id="qrcanvas"></div>
    <div class="small-note">店舗「${storeId}」用QRコード。印刷するか、スマホやタブレットの画面に表示して掲示してください。</div>
    <button class="btn btn-secondary" id="dlQr" style="margin-top:10px;">画像として保存する</button>
  </div>`;
  const url = location.href.split('?')[0] + '?store=' + storeId;
  new QRCode(container.querySelector('#qrcanvas'), {text:url, width:200, height:200});
  container.querySelector('#dlQr').onclick = ()=>{
    setTimeout(()=>{
      const canvas = container.querySelector('#qrcanvas canvas');
      if(!canvas) return;
      const link = document.createElement('a');
      link.download = 'malia-qr-'+storeId+'.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    }, 100);
  };
}

async function adminParticipants(cfg, stores){
  const wrap = el('<div class="card"></div>');
  const { data: parts, error } = await sb.from('participants').select('id,nickname');
  if(error || !parts || parts.length===0){
    wrap.innerHTML = `<h2 class="section-title">👨‍👩‍👧 参加者一覧</h2><p>まだ参加者がいません。</p>`;
    return wrap;
  }
  const { data: stampRows } = await sb.from('participant_stamps').select('participant_id,store_id');
  const list = parts.map(p=>({
    nickname:p.nickname,
    stamps:(stampRows||[]).filter(s=>s.participant_id===p.id).map(s=>s.store_id)
  }));
  const rows = list.map(p=>`<tr><td>${p.nickname}</td><td>${p.stamps.length}/${cfg.requiredStamps}</td><td>${p.stamps.join(', ')}</td></tr>`).join('');
  wrap.innerHTML = `

  <table class="admin-table"><thead><tr><th>ニックネーム</th><th>取得数</th><th>取得店舗</th></tr></thead><tbody>${rows}</tbody></table>`;
  return wrap;
}

async function adminAchievers(cfg){
  const wrap = el('<div class="card"></div>');
  const { data, error } = await sb.from('achievements').select('*').order('achieved_at', {ascending:false});
  const list = (error || !data) ? [] : data.map(a=>({number:a.number, nickname:a.nickname, stampCount:a.stamp_count, achievedAt:a.achieved_at}));
  wrap.innerHTML = `
  <h2 class="section-title">🏆 達成者一覧（${list.length}人）</h2>
  <label>達成番号で検索</label>
  <input type="text" id="search" placeholder="例）MALIA-2026-000001">
  <div id="results"></div>
  `;
  function renderList(items){
    const rows = items.map(a=>{
      const dt = new Date(a.achievedAt);
      const dtStr = dt.getFullYear()+'/'+(dt.getMonth()+1)+'/'+dt.getDate()+' '+String(dt.getHours()).padStart(2,'0')+':'+String(dt.getMinutes()).padStart(2,'0');
      return `<tr><td>${a.number}</td><td>${a.nickname}</td><td>${a.stampCount}</td><td>${dtStr}</td></tr>`;
    }).join('');
    return `<table class="admin-table"><thead><tr><th>達成番号</th><th>ニックネーム</th><th>数</th><th>達成日時</th></tr></thead><tbody>${rows}</tbody></table>`;
  }
  wrap.querySelector('#results').innerHTML = renderList(list);
  wrap.querySelector('#search').oninput = (e)=>{
    const q = e.target.value.trim().toLowerCase();
    const filtered = q? list.filter(a=>a.number.toLowerCase().includes(q)) : list;
    wrap.querySelector('#results').innerHTML = renderList(filtered);
  };
  return wrap;
}

async function adminErrorLogs(cfg){
  const wrap = el('<div class="card"></div>');
  const { data, error } = await sb.from('gacha_error_logs').select('*').order('created_at', {ascending:false}).limit(100);
  const list = (error || !data) ? [] : data;
  if(error){ console.error('adminErrorLogs failed', error); }
  const rows = list.map(l=>{
    const dt = new Date(l.created_at);
    const dtStr = dt.getFullYear()+'/'+(dt.getMonth()+1)+'/'+dt.getDate()+' '+String(dt.getHours()).padStart(2,'0')+':'+String(dt.getMinutes()).padStart(2,'0');
    return `<tr>
      <td>${dtStr}</td>
      <td>${l.nickname||'(不明)'}</td>
      <td>${l.stage||''}</td>
      <td style="max-width:220px;word-break:break-all;">${l.error_message||''}</td>
      <td>${l.error_code||''}</td>
    </tr>`;
  }).join('');
  wrap.innerHTML = `
  <h2 class="section-title">🛠️ ガチャ保存エラーログ（${list.length}件）</h2>
  <div class="small-note" style="margin-bottom:10px;">ガチャの保存が3回再試行しても失敗した場合に、自動で記録されます。参加者の画面には表示されません。新しい順に最大100件表示しています。</div>
  ${list.length===0 ? `<div class="small-note">記録されているエラーはありません。</div>` : `
  <div style="overflow-x:auto;">
  <table class="admin-table">
    <thead><tr><th>日時</th><th>ニックネーム</th><th>回数</th><th>エラー内容</th><th>コード</th></tr></thead>

        </p>
      </div>`;
    return;
  }
  const params = new URLSearchParams(location.search);
  const storeParam = params.get('store');

      if(!state.participant){ state.pendingStoreId = storeParam; go('join'); }
      else{ go('codeInput', {currentStoreId:storeParam, codeError:''}); }

})();
